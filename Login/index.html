<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <title>LuCa Pets Login</title>
</head>

<body>
    <main class="caixa-central">

        <div class="carrossel">
            <div class="slides">
                <div class="slide">
                    <img src="./Img/gato1.jpeg" alt="imagem de gato">
                </div> 

                <div class="slide">
                    <img src="./Img/gato2.jpeg" alt="imagem de gato">
                </div>

                <div class="slide">
                    <img src="./Img/gato3.jpeg" alt="imagem de gato">
                </div>

                <div class="slide">
                    <img src="./Img/gato4.jpeg" alt="imagem de gato">
                </div>

                <div class="slide">
                    <img src="./Img/gato5.jpeg" alt="imagem de gato">
                </div>
            </div>
        </div>

        <section class="caixa-login">
                <h1>LuCa Pets</h1>
                <p class="slogan">Amor e cuidado em cada patinha</p>

                <form autocomplete="on">

                    <div class="input-box">
                            <label for="usuario" class="title">
                                <i class="fa-solid fa-paw"></i>
                                Usuário
                            </label>
                        <input type="email" id="usuario" name="usuario" autocomplete="email" required>
                    </div>

                    <div class="input-box">
                            <label for="senha" class="title">
                                <i class="fa-solid fa-paw"></i>
                                Senha
                            </label>
                        
                        <input type="password" id="senha" name="senha" autocomplete="senha" required>
                    </div>
                         <label for="lembrar-senha" class="lembrar">
                            <input type="checkbox" id="lembrar-senha">
                            Lembrar senha
                        </label>


                    <button type="submit" class="login">Entrar</button>

                    <div class="cadastro-esqueci">
                        <div class="cadastro">
                            <i class="fa-solid fa-bone"></i>
                            <p>Não tem conta? <a href="#">Cadastre-se</a></p>   
                        </div>
                        
                        <div class="esqueci">
                            <i class="fa-solid fa-bone"></i>
                            <p><a href="#">Esqueceu sua senha?</a></p>
                        </div>
                    </div>

                </form>

            </section>
    
    </main>

    <script src="script.js"></script>
</body>
</html>
