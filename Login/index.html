<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <title>LuCa Pets Login</title>
</head>

<body>
    <div class="caixaCentral">

        <div class="carrossel">
            <div class="slides">
                <img src="./Img/gato1.jpeg" alt="imagem de gato">
                <img src="./Img/gato2.jpeg" alt="imagem de gato">
                <img src="./Img/gato3.jpeg" alt="imagem de gato">
                <img src="./Img/gato4.jpeg" alt="imagem de gato">
                <img src="./Img/gato5.jpeg" alt="imagem de gato">
            </div>
        </div>

        <section class="CaixaDeLogin">
                <h1>LuCa Pets</h1>
                <p class="slogan">Amor e cuidado em cada patinha</p>

                <form>

                    <div class="inputBox">
                        <div class="title">
                            <i class="fa-solid fa-paw"></i>
                            <label for="usuário">Usuário</label>
                        </div>
                        <input type="email" placeholder="Digite seu email">
                    </div>

                    <div class="inputBox">
                        <div class="title">
                            <i class="fa-solid fa-paw"></i>
                            <label for="senha">Senha</label>
                        </div>
                        <input type="password" placeholder="Digite sua senha">
                    </div>

                    <div class="lembrar">
                        <input type="checkbox">
                        <label for="lembrarSenha">Lembrar senha</label>
                    </div>

                    <button type="submit" class="login">Login</button>

                    <div class="cadastroEsqueci">
                        <div class="cadastro">
                            <i class="fa-solid fa-bone";"></i>
                            <p>Não tem conta? <a href="#">Cadastre-se</a></p>   
                        </div>
                        
                        <div class="esqueci">
                            <i class="fa-solid fa-bone"></i>
                            <p><a href="#">Esqueceu sua senha?</a></p>
                        </div>
                    </div>

                </form>

            </section>
    
    </div>
</body>
</html>
