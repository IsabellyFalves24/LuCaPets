<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <title>LuCa Pets Login</title>
</head>

<body>
    <div class="caixaCentral">

        <div class="carrossel">
            <div class="slides">
                <img src="./Img/gato1.jpeg" alt="imagem de gato">
                <img src="./Img/gato2.jpeg" alt="imagem de gato">
                <img src="./Img/gato3.jpeg" alt="imagem de gato">
                <img src="./Img/gato4.jpeg" alt="imagem de gato">
                <img src="./Img/gato5.jpeg" alt="imagem de gato">
            </div>

            <section class="CaixaDeLogin">
                <h1>LuCa Pets</h1>
                <p>Amor e cuidado em cada patinha</p>

                <form action="">

                    <div class="input-box">
                        <div class="title">
                            <i class="fa-solid fa-paw" style="color: rgb(149, 0, 4);"> </i>
                            <p>Usuário</p>
                        </div>
                        <input type="email">
                    </div>

                    <div class="input-box">
                        <div class="title">
                            <i class="fa-solid fa-paw" style="color: rgb(149, 0, 4);"> </i>
                            <p>Senha</p>
                        </div>
                        <input type="password">
                    </div>

                    <div class="lembrar">
                        <label for="Lembrar senha">
                            <input type="checkbox">
                            Lembrar senha
                        </label>
                    </div>

                    <button type="submit" class="
                    login">Login</button>

                    <div class="Cadastro-Esqueci">
                        <div class="cadastro">
                            <i class="fa-solid fa-bone" style="color: rgb(149, 0, 4);"></i>
                            <p>Não tem conta? <a href="#">Cadastre-se</a></p>
                        </div>
                        
                        <div class="esqueci">
                            <i class="fa-solid fa-bone" style="color: rgb(149, 0, 4);"></i>
                            <p><a href="#">Esqueceu sua senha?</a></p>
                        </div>
                    </div>

                </form>

            </section>

        </div>
    </div>
</body>
</html>
